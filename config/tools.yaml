# =============================================================================
# Malware Analysis VM - Tool Definitions
# =============================================================================
#
# This file defines all tools to be installed in the malware analysis VM.
#
# Each tool entry supports the following fields:
#
#   name          (required) Lowercase slug identifier for the tool.
#   display_name  (required) Human-readable name shown in logs and shortcuts.
#   method        (required) Install method. One of:
#                   - choco            Install via Chocolatey package manager.
#                   - direct-download  Download from a URL and extract/install.
#                   - powershell       Run an arbitrary PowerShell command.
#                   - shortcut-only    No install; just create a shortcut to an
#                                      exe that another tool already installed.
#                   - winget           Install via Windows Package Manager (winget).
#   enabled       (required) Set to false to skip this tool during provisioning.
#   category      (optional) Grouping for desktop shortcut folders. One of:
#                   Debuggers, Disassemblers, "PE Analysis", Network,
#                   "System Monitoring", Utilities, or null.
#   exe_path      (optional) Full path to the main executable. Used to create
#                   desktop/start-menu shortcuts.
#   add_to_path   (optional) Directory to append to the system PATH.
#   post_install  (optional) PowerShell script block to run after installation.
#
# Method-specific fields:
#
#   choco:
#     choco_package  (required) Chocolatey package name.
#     choco_params   (optional) Extra parameters passed to choco install.
#
#   direct-download:
#     url            (required) Download URL for the artifact.
#     download_type  (required) One of: zip, exe, msi, 7z.
#     install_dir    (required) Local directory to extract/install into.
#     silent_args    (optional) Arguments for silent install (exe/msi only).
#
#   winget:
#     winget_id      (required) The winget package identifier.
#
#   powershell:
#     command         (required) PowerShell command or script block to execute.
#
#   shortcut-only:
#     depends_on     (required) The name (slug) of the tool that provides the exe.
#     exe_path       (required) Full path to the executable to create a shortcut for.
#
# To add a new tool, copy an existing entry with the same method and update
# the fields. Place it in the appropriate position (tools are installed in
# the order listed here).
# =============================================================================

