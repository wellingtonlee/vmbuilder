  # ---------------------------------------------------------------------------
  # Fonts
  # ---------------------------------------------------------------------------

  - name: meslo-nerd-font
    display_name: "MesloLG Nerd Font"
    method: direct-download
    url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.3.0/Meslo.zip"
    download_type: zip
    install_dir: "C:\\Tools\\Fonts\\MesloLG"
    category: null
    enabled: true
    post_install: |
      # Install all MesloLG Nerd Font .ttf files into Windows
      $fontSourceDir = "C:\Tools\Fonts\MesloLG"
      $fontDestDir   = "C:\Windows\Fonts"
      $regPath       = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Fonts"

      Get-ChildItem -Path $fontSourceDir -Filter "*.ttf" -Recurse | ForEach-Object {
          $fontFile = $_
          $destPath = Join-Path $fontDestDir $fontFile.Name

          # Copy font file to Windows Fonts directory
          Copy-Item -Path $fontFile.FullName -Destination $destPath -Force

          # Register the font in the registry
          # Use the font filename (without extension) as the display name
          $fontName = [System.IO.Path]::GetFileNameWithoutExtension($fontFile.Name) + " (TrueType)"
          New-ItemProperty -Path $regPath -Name $fontName -Value $fontFile.Name -PropertyType String -Force | Out-Null

          Write-Host "[MesloLG] Installed font: $($fontFile.Name)"
      }
      Write-Host "[MesloLG] Font installation complete."

