  - name: ret-sync
    display_name: "ret-sync"
    method: direct-download
    # NOTE: Update this URL to the latest ret-sync release zip.
    url: "https://github.com/bootleg/ret-sync/releases/PLACEHOLDER_UPDATE_ME.zip"
    download_type: zip
    install_dir: "C:\\Tools\\ret-sync"
    category: Debuggers
    enabled: true
    post_install: |
      # Copy the x64dbg sync plugin DLL to the x64dbg plugins directory
      $x64dbgPluginDir = "C:\ProgramData\chocolatey\lib\x64dbg.portable\tools\x64dbg\release\x64\plugins"
      if (Test-Path $x64dbgPluginDir) {
          $syncDll = Get-ChildItem -Path "C:\Tools\ret-sync" -Recurse -Filter "x64dbg_sync.dp64" | Select-Object -First 1
          if ($syncDll) {
              Copy-Item -Path $syncDll.FullName -Destination $x64dbgPluginDir -Force
              Write-Host "[ret-sync] Copied x64dbg sync plugin to $x64dbgPluginDir"
          } else {
              Write-Warning "[ret-sync] Could not find x64dbg_sync.dp64 in C:\Tools\ret-sync"
          }
      } else {
          Write-Warning "[ret-sync] x64dbg plugins directory not found at $x64dbgPluginDir"
      }

      # WinDbg extension: the ret-sync WinDbg extension (sync.dll) should be loaded
      # manually or placed in the WinDbg extensions directory. Typical location:
      #   C:\Tools\ret-sync\ext_windbg\sync.dll
      # Load in WinDbg with: .load C:\Tools\ret-sync\ext_windbg\sync.dll
      $windbgExt = Get-ChildItem -Path "C:\Tools\ret-sync" -Recurse -Filter "sync.dll" | Select-Object -First 1
      if ($windbgExt) {
          Write-Host "[ret-sync] WinDbg extension found at: $($windbgExt.FullName)"
          Write-Host "[ret-sync] Load in WinDbg with: .load $($windbgExt.FullName)"
      }

